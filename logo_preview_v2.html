<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MalIntent Logo Animation Preview</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    h2 {
      margin-bottom: 3rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 1rem;
      opacity: 0.8;
      z-index: 10;
    }

    /* --- DARK MODE (RED WALL on dark background → black gaps) --- */
    .dark-mode {
      background-color: #0f172a;
      color: white;
      --wall-top: #ff4d4d;
      --wall-left: #b30000;
      --wall-right: #e60000;
      --glow-color: rgba(255, 77, 77, 0.4);
      --glow-bright: rgba(255, 77, 77, 0.9);
    }

    /* --- LIGHT MODE (NAVY WALL on white background → white gaps) --- */
    .light-mode {
      background-color: #ffffff;
      color: #1e293b;
      --wall-top: #475569;
      --wall-left: #0f172a;
      --wall-right: #1e293b;
      --glow-color: rgba(51, 65, 85, 0.5);
      --glow-bright: rgba(51, 65, 85, 0.95);
    }

    .logo-wrapper {
      position: relative;
      width: 300px;
      height: 380px;
    }

    svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      animation: centerPulse 2.5s infinite alternate ease-in-out;
    }

    @keyframes centerPulse {
      0% {
        filter: drop-shadow(0px 0px 15px var(--glow-color));
      }
      100% {
        filter: drop-shadow(0px 0px 40px var(--glow-bright));
      }
    }

    .face-top { fill: var(--wall-top); }
    .face-left { fill: var(--wall-left); }
    .face-front { fill: var(--wall-right); }
  </style>
</head>
<body>

  <div class="container dark-mode">
    <h2>Dark Mode (Red Wall)</h2>
    <div class="logo-wrapper" id="dark-logo"></div>
  </div>

  <div class="container light-mode">
    <h2>Light Mode (Navy Wall)</h2>
    <div class="logo-wrapper" id="light-logo"></div>
  </div>

  <script>
    /*
      Reference image: 3D isometric brick wall
      - 4 bricks wide (columns step to the UPPER-RIGHT)
      - 4 bricks tall  (rows step straight DOWN)
      - 1 brick deep   (depth extends to the UPPER-LEFT)

      Each front-face brick is a parallelogram:
        Left/right edges are vertical.
        Top/bottom edges slant upward to the right at 30°.

      Visible faces:
        FRONT: All 16 bricks (the main 4×4 grid)
        TOP:   Only the top row (r=0), 4 bricks
        LEFT:  Only the leftmost column (c=0), 4 bricks
    */

    const createWallSVG = () => {
      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNS, 'svg');
      svg.setAttribute('viewBox', '0 0 260 390');

      const g = document.createElementNS(svgNS, 'g');
      g.setAttribute('transform', 'translate(55, 130)');

      // Brick front-face dimensions
      const W  = 35;                // horizontal width of front face
      const S  = W * 0.577;         // slant (right side is this much higher) ≈ 20.2
      const H  = 45;                // vertical height of front face

      // Depth face dimensions (wall thickness)
      const D  = 22;                // horizontal depth extent
      const DS = D * 0.577;         // depth slant ≈ 12.7

      // Gap between bricks
      const GAP = 6;

      // Grid step per column (going right-and-up)
      const colX = W + GAP;
      const colY = S + GAP * 0.577;

      // Grid step per row (going straight down)
      const rowY = H + GAP;

      const poly = (parent, points, cls) => {
        const el = document.createElementNS(svgNS, 'polygon');
        el.setAttribute('points', points.map(p => p.join(',')).join(' '));
        el.setAttribute('class', cls);
        parent.appendChild(el);
      };

      // Draw back-to-front: c=0 first (leftmost), r=0 first (top)
      for (let c = 0; c < 4; c++) {
        for (let r = 0; r < 4; r++) {

          // Origin = top-left corner of this brick's front face
          const ox = c * colX;
          const oy = -c * colY + r * rowY;

          // Front face corners
          const fTL = [ox,       oy];
          const fTR = [ox + W,   oy - S];
          const fBR = [ox + W,   oy - S + H];
          const fBL = [ox,       oy + H];

          // Top face (only for top row)
          if (r === 0) {
            const tBL = fTL;                          // front-left
            const tBR = fTR;                          // front-right
            const tTR = [fTR[0] - D, fTR[1] - DS];   // back-right
            const tTL = [fTL[0] - D, fTL[1] - DS];   // back-left
            poly(g, [tBL, tBR, tTR, tTL], 'face-top');
          }

          // Left face (only for leftmost column)
          if (c === 0) {
            const lTR = fTL;                          // front-top
            const lBR = fBL;                          // front-bottom
            const lBL = [fBL[0] - D, fBL[1] - DS];   // back-bottom
            const lTL = [fTL[0] - D, fTL[1] - DS];   // back-top
            poly(g, [lTR, lBR, lBL, lTL], 'face-left');
          }

          // Front face (always visible)
          poly(g, [fTL, fTR, fBR, fBL], 'face-front');
        }
      }

      svg.appendChild(g);
      return svg;
    };

    document.getElementById('dark-logo').appendChild(createWallSVG());
    document.getElementById('light-logo').appendChild(createWallSVG());
  </script>
</body>
</html>
